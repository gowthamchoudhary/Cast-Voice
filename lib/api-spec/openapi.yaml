openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CastVoice API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User profile operations
  - name: stories
    description: Story operations
  - name: projects
    description: Project operations
  - name: voices
    description: Voice generation operations
  - name: invites
    description: Invite link operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current auth state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserResponse"

  /users/profile:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateUserProfile
      tags: [users]
      summary: Create or update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/voice:
    post:
      operationId: cloneUserVoice
      tags: [users]
      summary: Clone user voice from audio blob URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloneVoiceBody"
      responses:
        "200":
          description: Voice cloned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloneVoiceResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stories:
    get:
      operationId: listStories
      tags: [stories]
      summary: List all available stories
      responses:
        "200":
          description: List of stories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Story"

  /stories/{id}:
    get:
      operationId: getStory
      tags: [stories]
      summary: Get a story by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stories/fetch-url:
    post:
      operationId: fetchStoryFromUrl
      tags: [stories]
      summary: Fetch and parse a story from a URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchStoryUrlBody"
      responses:
        "200":
          description: Extracted story data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractedStory"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stories/parse-text:
    post:
      operationId: parseStoryText
      tags: [stories]
      summary: Parse raw text into a story
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseStoryTextBody"
      responses:
        "200":
          description: Extracted story data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractedStory"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List user's story projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project cast or status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/generate:
    post:
      operationId: generateAudioDrama
      tags: [projects]
      summary: Start audio drama generation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Generation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/status:
    get:
      operationId: getGenerationStatus
      tags: [projects]
      summary: Get generation status and progress
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationStatus"

  /voices/design:
    post:
      operationId: designVoice
      tags: [voices]
      summary: Design a voice using ElevenLabs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DesignVoiceBody"
      responses:
        "200":
          description: Designed voice ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DesignVoiceResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invites:
    post:
      operationId: createInviteLink
      tags: [invites]
      summary: Create an invite link for a character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteLinkBody"
      responses:
        "201":
          description: Created invite link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteLink"

  /invites/{uuid}:
    get:
      operationId: getInviteLink
      tags: [invites]
      summary: Get an invite link by UUID
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite link details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteLinkDetails"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invites/{uuid}/submit:
    post:
      operationId: submitInviteVoice
      tags: [invites]
      summary: Submit voice recording for an invite
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitInviteVoiceBody"
      responses:
        "200":
          description: Voice submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteLink"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AuthUserResponse:
      type: object
      properties:
        isAuthenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - isAuthenticated

    AuthUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        profileImage:
          type: ["string", "null"]
      required:
        - id
        - username

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        replitUserId:
          type: string
        displayName:
          type: string
        role:
          type: ["string", "null"]
        group:
          type: ["string", "null"]
        voiceCloneId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - replitUserId
        - displayName
        - createdAt

    UpdateUserProfileBody:
      type: object
      properties:
        displayName:
          type: string
        role:
          type: ["string", "null"]
        group:
          type: ["string", "null"]
      required:
        - displayName

    CloneVoiceBody:
      type: object
      properties:
        audioDataUrl:
          type: string
        fileName:
          type: string
        displayName:
          type: string
      required:
        - audioDataUrl
        - fileName
        - displayName

    CloneVoiceResponse:
      type: object
      properties:
        voiceCloneId:
          type: string
      required:
        - voiceCloneId

    Story:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        genre:
          type: string
        synopsis:
          type: ["string", "null"]
        characters:
          type: array
          items:
            $ref: "#/components/schemas/Character"
        sceneImageUrl:
          type: ["string", "null"]
        scriptJson:
          type: object
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - genre
        - characters
        - scriptJson
        - createdAt

    Character:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
      required:
        - id
        - name
        - description

    FetchStoryUrlBody:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    ParseStoryTextBody:
      type: object
      properties:
        text:
          type: string
      required:
        - text

    ExtractedStory:
      type: object
      properties:
        title:
          type: string
        characters:
          type: array
          items:
            $ref: "#/components/schemas/Character"
        rawText:
          type: string
      required:
        - title
        - characters
        - rawText

    Project:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        storyId:
          type: integer
        storyTitle:
          type: string
        storyGenre:
          type: string
        castJson:
          type: object
        status:
          type: string
        finalAudioUrl:
          type: ["string", "null"]
        sceneImagesJson:
          type: ["object", "null"]
        generationProgress:
          type: ["integer", "null"]
        generationStep:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - storyId
        - storyTitle
        - storyGenre
        - castJson
        - status
        - createdAt

    CreateProjectBody:
      type: object
      properties:
        storyId:
          type: integer
        castJson:
          type: object
      required:
        - storyId
        - castJson

    UpdateProjectBody:
      type: object
      properties:
        castJson:
          type: object
        status:
          type: string

    GenerationStatus:
      type: object
      properties:
        status:
          type: string
        progress:
          type: integer
        currentStep:
          type: ["string", "null"]
        finalAudioUrl:
          type: ["string", "null"]
        sceneImagesJson:
          type: ["object", "null"]
      required:
        - status
        - progress

    DesignVoiceBody:
      type: object
      properties:
        description:
          type: string
      required:
        - description

    DesignVoiceResponse:
      type: object
      properties:
        voiceId:
          type: string
      required:
        - voiceId

    CreateInviteLinkBody:
      type: object
      properties:
        projectId:
          type: integer
        characterId:
          type: string
      required:
        - projectId
        - characterId

    InviteLink:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        characterId:
          type: string
        uuid:
          type: string
        filledByUserId:
          type: ["integer", "null"]
        voiceCloneId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - characterId
        - uuid
        - createdAt

    InviteLinkDetails:
      type: object
      properties:
        invite:
          $ref: "#/components/schemas/InviteLink"
        character:
          $ref: "#/components/schemas/Character"
        storyTitle:
          type: string
        isFilled:
          type: boolean
      required:
        - invite
        - character
        - storyTitle
        - isFilled

    SubmitInviteVoiceBody:
      type: object
      properties:
        audioDataUrl:
          type: string
        displayName:
          type: string
      required:
        - audioDataUrl
        - displayName
